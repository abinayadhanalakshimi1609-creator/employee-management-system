<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System - Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
    <h2>EMS</h2>

    <ul>
        <li onclick="window.location.href='dashboard.html'">🏠 Dashboard</li>

        <li onclick="window.location.href='employeeList.html'">👨‍💼 Employee List</li>

        <li onclick="window.location.href='addEmployee.html'">➕ Add Employee</li>

        <li onclick="window.location.href='settings.html'">⚙ Settings</li>

        <li onclick="logout()">🚪 Logout</li>
    </ul>
</div>

    <div class="main">

        <div class="header">
            <h1>Dashboard</h1>
            <p>Welcome Admin 👋</p>
        </div>

        <div class="cards">

            <div class="card">
                <h2 id="totalEmployees">0</h2>
                <p>Total Employees</p>
            </div>

            <div class="card">
                <h2 id="totalDepartments">0</h2>
                <p>Departments</p>
            </div>

            <div class="card">
                <h2 id="newEmployees">0</h2>
                <p>New Employees</p>
            </div>

            <div class="card">
                <h2 id="pendingRequests">0</h2>
                <p>Pending Requests</p>
            </div>

        </div>

    </div>

</div>
<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "login.html";
}
</script>

<script src="employee.js"></script>

</body>
</html>
