<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>EMS</h2>

        <ul>
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="addEmployee.html">➕ Add Employee</a></li>
            <li><a href="employeeList.html">👨‍💼 Employee List</a></li>
            <li><a href="#">⚙️ Settings</a></li>
            <li><a href="#" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h1>Add Employee</h1>
            <p>Enter Employee Details</p>
        </div>

        <div class="card">

            <form id="employeeForm">

                <input type="text" id="employeeId" placeholder="Employee ID" required>

                <input type="text" id="employeeName" placeholder="Full Name" required>

                <input type="email" id="employeeEmail" placeholder="Email Address" required>

                <input type="tel" id="employeePhone" placeholder="Phone Number" required>

                <label for="department">Department</label>
                <select id="department" required>
                    <option value="">Select Department</option>
                    <option value="IT">Information Technology (IT)</option>
                    <option value="HR">Human Resources (HR)</option>
                    <option value="Finance">Finance</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Sales">Sales</option>
                    <option value="Administration">Administration</option>
                </select>

                <label for="designation">Designation</label>
                <select id="designation" required>
                    <option value="">Select Designation</option>
                    <option value="Software Developer">Software Developer</option>
                    <option value="Full Stack Developer">Full Stack Developer</option>
                    <option value="Frontend Developer">Frontend Developer</option>
                    <option value="Backend Developer">Backend Developer</option>
                    <option value="UI/UX Designer">UI/UX Designer</option>
                    <option value="HR Executive">HR Executive</option>
                    <option value="Manager">Manager</option>
                </select>

                <input type="number" id="salary" placeholder="Monthly Salary" min="1000" required>

                <label for="joiningDate">Joining Date</label>
                <input type="date" id="joiningDate" required>

                <label for="address">Address</label>
                <textarea id="address" placeholder="Enter Employee Address" rows="4"></textarea>

                <button type="submit">Save Employee</button>

            </form>

        </div>

    </div>

</div>

<script src="employee.js"></script>

</body>

</html>
